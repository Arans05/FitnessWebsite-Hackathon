<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness App</title>
    <!-- Inter Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            @apply bg-[#0f172a] text-white;
        }
        .container-view, #app-container, #loading-overlay {
            display: none;
        }
        .container-view.active, #app-container.active, #loading-overlay.active {
            display: flex;
        }
        #app-container.active {
            display: flex;
        }
        .progress-bar-container {
            @apply relative w-full h-2 rounded-full bg-gray-700;
        }
        .progress-bar {
            @apply h-full rounded-full transition-all duration-500 ease-out;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-50 bg-black/80 flex-col justify-center items-center container-view">
        <div class="spinner"></div>
        <p class="text-white mt-4">Loading...</p>
    </div>

    <!-- Login/Signup Container -->
    <div id="login-container" class="min-h-screen w-full flex-col justify-center items-center p-4 container-view active">
        <div class="w-full max-w-md">
            <h1 class="text-4xl font-bold text-center mb-8 text-white">Fitness Tracker</h1>
            <!-- Login Form -->
            <div id="login-form" class="bg-gray-900 p-8 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
                <input type="email" id="login-email" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-md px-4 py-2 mb-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="login-password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-md px-4 py-2 mb-6 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition-colors">Login</button>
                <p class="text-center text-gray-400 mt-4">Don't have an account? <a href="#" id="show-signup" class="text-blue-400 hover:underline">Sign Up</a></p>
                <p id="login-error" class="text-red-500 text-center mt-2"></p>
            </div>
            <!-- Signup Form -->
            <div id="signup-form" class="bg-gray-900 p-8 rounded-lg shadow-lg" style="display: none;">
                <h2 class="text-2xl font-bold mb-6 text-center">Sign Up</h2>
                <input type="email" id="signup-email" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-md px-4 py-2 mb-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="signup-password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-md px-4 py-2 mb-6 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="signup-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md transition-colors">Sign Up</button>
                <p class="text-center text-gray-400 mt-4">Already have an account? <a href="#" id="show-login" class="text-blue-400 hover:underline">Login</a></p>
                <p id="signup-error" class="text-red-500 text-center mt-2"></p>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="min-h-screen w-full container-view">
        <!-- Sidebar Navigation -->
        <aside class="flex flex-col w-64 bg-gray-900 border-r border-gray-800 p-4">
            <h1 class="text-2xl font-bold mb-8 text-white">Fitness Tracker</h1>
            <nav class="flex-grow">
                <ul class="space-y-2">
                    <li>
                        <a href="#" id="nav-dashboard" class="nav-link flex items-center p-3 rounded-md transition-colors hover:bg-gray-800 text-gray-400 active">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-3 h-5 w-5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                            Dashboard
                        </a>
                    </li>
                </ul>
            </nav>
            <div id="user-info" class="mt-auto text-xs text-gray-500 break-words">
                <p id="user-email-display"></p>
                <button id="sign-out-btn" class="w-full mt-2 text-left text-red-400 hover:text-red-300">Sign Out</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-grow p-8 overflow-y-auto">
            <div id="dashboard-content">
                <h2 class="text-3xl font-bold mb-6" id="welcome-message">Welcome Back!</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-gray-800 p-4 rounded-lg shadow-md flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-400">Calories</p>
                            <p class="text-2xl font-bold"><span id="calories-consumed">0</span> / <span id="calories-goal">2000</span></p>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-8 w-8 text-red-400"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </div>
                    <div class="bg-gray-800 p-4 rounded-lg shadow-md flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-400">Steps</p>
                            <p class="text-2xl font-bold"><span id="steps-taken">0</span> / <span id="steps-goal">10000</span></p>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-8 w-8 text-yellow-400"><path d="M5 22s1.5-2 4-2 4 2 4 2 1.5-2 4-2-4-2-4-2-1.5 2-4 2-4-2-4-2-1.5 2-4 2z"/><path d="M12 14v8"/></svg>
                    </div>
                    <div class="bg-gray-800 p-4 rounded-lg shadow-md flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-400">Workout Today</p>
                            <p class="text-2xl font-bold" id="workout-status">No</p>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-8 w-8 text-green-400"><path d="M5.5 22H3.6c-.9 0-1.6-.7-1.6-1.6v-1.6c0-.9.7-1.6 1.6-1.6h1.8c.9 0 1.6.7 1.6 1.6v1.8c0 .9-.7 1.6-1.6 1.6zM15.9 2.1c-.9 0-1.6.7-1.6 1.6v1.8c0 .9.7 1.6 1.6 1.6h1.8c.9 0 1.6-.7 1.6-1.6V3.6c0-.9-.7-1.6-1.6-1.6zM11.6 12.5c0 .9-.7 1.6-1.6 1.6H8.2c-.9 0-1.6-.7-1.6-1.6v-1.8c0-.9.7-1.6 1.6-1.6h1.8c.9 0 1.6.7 1.6 1.6v1.8z"/><path d="m20.4 17.2-1.3-1.3c-.3-.3-.7-.3-1 0l-1.6 1.6c-.3.3-.3.7 0 1l1.3 1.3c.3.3.7.3 1 0l1.6-1.6c.3-.3.3-.7 0-1zM3.6 3.6 5 5m14 14 1.4 1.4M12 8V2m0 20v-6m-8-6H2m20 0h-6"/></svg>
                    </div>
                    <div class="bg-gray-800 p-4 rounded-lg shadow-md">
                        <p class="text-sm text-gray-400">Water Intake</p>
                        <p class="text-2xl font-bold"><span id="water-intake">0</span> / <span id="water-goal">64</span> oz</p>
                        <div class="progress-bar-container mt-2">
                            <div id="water-progress-bar" class="progress-bar bg-blue-500" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const firebaseConfig = {
          apiKey: "AIzaSyDqQGsIz-mnJiMNZmkM0gL5eOhQV6jTAh0",
          authDomain: "fitnessapp-721d9.firebaseapp.com",
          projectId: "fitnessapp-721d9",
          storageBucket: "fitnessapp-721d9.appspot.com",
          messagingSenderId: "339656705043",
          appId: "1:339656705043:web:b5dbd141d09398014a2be6",
          measurementId: "G-XFQYPFN6GR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userId = null;
        let unsubscribeWorkout, unsubscribeWater;
        
        const loginContainer = document.getElementById('login-container');
        const appContainer = document.getElementById('app-container');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const userEmailDisplay = document.getElementById('user-email-display');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userId = user.uid;
                loadingOverlay.classList.add('active');
                userEmailDisplay.textContent = user.email;
                
                const success = await loadDashboardData();
                if (success) {
                    setupDashboardListeners();
                    loginContainer.classList.remove('active');
                    appContainer.classList.add('active');
                    loadingOverlay.classList.remove('active');
                } else {
                    loadingOverlay.classList.remove('active');
                    alert("Failed to load dashboard data. Please check your Firestore rules.");
                    signOut(auth);
                }
            } else {
                userId = null;
                appContainer.classList.remove('active');
                loginContainer.classList.add('active');
                loadingOverlay.classList.remove('active');
                if (unsubscribeWorkout) unsubscribeWorkout();
                if (unsubscribeWater) unsubscribeWater();
            }
        });

        async function loadDashboardData() {
            if (!userId) return false;
            try {
                const workoutsQuery = query(collection(db, "users", userId, "workouts"));
                const waterQuery = query(collection(db, "users", userId, "water"));
                const [workoutsSnapshot, waterSnapshot] = await Promise.all([
                    getDocs(workoutsQuery),
                    getDocs(waterQuery)
                ]);
                
                updateDashboardWorkouts(workoutsSnapshot.docs.map(doc => doc.data()));
                updateWaterIntake(waterSnapshot.docs.map(doc => doc.data()));
                return true;
            } catch (error) {
                console.error("Error loading initial dashboard data:", error);
                return false;
            }
        }

        function setupDashboardListeners() {
            if (!userId) return;
            const errorHandler = (error) => console.error("Listener error:", error);

            unsubscribeWorkout = onSnapshot(query(collection(db, "users", userId, "workouts")), (snapshot) => {
                updateDashboardWorkouts(snapshot.docs.map(doc => doc.data()));
            }, errorHandler);

            unsubscribeWater = onSnapshot(query(collection(db, "users", userId, "water")), (snapshot) => {
                updateWaterIntake(snapshot.docs.map(doc => doc.data()));
            }, errorHandler);
        }
        
        function updateDashboardWorkouts(workouts) {
            const sortedWorkouts = workouts.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            const statusEl = document.getElementById('workout-status');
            if (!statusEl) return;

            if (sortedWorkouts.length > 0) {
                const last = sortedWorkouts[0];
                const date = new Date(last.timestamp?.seconds * 1000).toLocaleDateString();
                if (date === new Date().toLocaleDateString()) {
                    statusEl.textContent = `Yes (${last.duration} min)`;
                } else {
                    statusEl.textContent = 'No';
                }
            } else {
                statusEl.textContent = 'No';
            }
        }

        function updateWaterIntake(logs) {
            const total = logs
                .filter(l => new Date(l.timestamp?.seconds * 1000).toLocaleDateString() === new Date().toLocaleDateString())
                .reduce((sum, l) => sum + (l.amount || 0), 0);
            
            const goal = parseFloat(document.getElementById('water-goal').textContent);
            document.getElementById('water-intake').textContent = total;
            const progress = (total / goal) * 100;
            const bar = document.getElementById('water-progress-bar');
            bar.style.width = `${Math.min(progress, 100)}%`;
            bar.classList.toggle('bg-green-500', progress >= 100);
            bar.classList.toggle('bg-blue-500', progress < 100);
        }

        document.getElementById('show-signup').addEventListener('click', (e) => { e.preventDefault(); loginForm.style.display = 'none'; signupForm.style.display = 'block'; });
        document.getElementById('show-login').addEventListener('click', (e) => { e.preventDefault(); signupForm.style.display = 'none'; loginForm.style.display = 'block'; });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = '';
            loadingOverlay.classList.add('active');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) { 
                errorEl.textContent = error.message; 
                loadingOverlay.classList.remove('active');
            }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const errorEl = document.getElementById('signup-error');
            errorEl.textContent = '';
            loadingOverlay.classList.add('active');
            try {
                await createUserWithEmailAndPassword(auth, email, password);
            } catch (error) { 
                errorEl.textContent = error.message; 
                loadingOverlay.classList.remove('active');
            }
        });

        document.getElementById('sign-out-btn').addEventListener('click', () => {
            signOut(auth);
        });
    </script>
</body>
</html>
