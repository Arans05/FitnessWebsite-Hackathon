<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness App</title>
    <!-- Inter Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            @apply bg-[#0f172a] text-white;
        }
        .view-container, .page-content {
            display: none;
        }
        .view-container.active {
            display: flex;
        }
        .page-content.active {
            display: block;
        }
        #app-container.active {
            flex-direction: column;
        }
        .nav-link.active {
            @apply bg-gray-700 text-white;
        }
        .progress-bar-container {
            @apply relative w-full h-2 rounded-full bg-gray-700;
        }
        .progress-bar {
            @apply h-full rounded-full transition-all duration-500 ease-out;
        }
    </style>
</head>
<body>

    <!-- Login/Signup Container -->
    <div id="login-container" class="min-h-screen w-full flex-col justify-center items-center p-4 view-container active">
        <div class="w-full max-w-md">
            <h1 class="text-4xl font-bold text-center mb-8 text-white">Fitness Tracker</h1>
            <!-- Login Form -->
            <div id="login-form" class="bg-gray-900 p-8 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
                <input type="email" id="login-email" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-md px-4 py-2 mb-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="login-password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-md px-4 py-2 mb-6 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition-colors">Login</button>
                <p class="text-center text-gray-400 mt-4">Don't have an account? <a href="#" id="show-signup" class="text-blue-400 hover:underline">Sign Up</a></p>
                <p id="login-error" class="text-red-500 text-center mt-2"></p>
            </div>
            <!-- Signup Form -->
            <div id="signup-form" class="bg-gray-900 p-8 rounded-lg shadow-lg" style="display: none;">
                <h2 class="text-2xl font-bold mb-6 text-center">Sign Up</h2>
                <input type="email" id="signup-email" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-md px-4 py-2 mb-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="signup-password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-md px-4 py-2 mb-6 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="signup-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md transition-colors">Sign Up</button>
                <p class="text-center text-gray-400 mt-4">Already have an account? <a href="#" id="show-login" class="text-blue-400 hover:underline">Login</a></p>
                <p id="signup-error" class="text-red-500 text-center mt-2"></p>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="min-h-screen w-full view-container">
        <!-- Responsive Navigation Bar -->
        <nav class="bg-gray-900 border-b border-gray-800">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <a href="#" id="nav-logo" class="text-white font-bold text-xl">
                            Fitness Tracker
                        </a>
                        <div class="hidden md:block">
                            <div class="ml-10 flex items-baseline space-x-4">
                                <a href="#" id="nav-dashboard" class="nav-link text-gray-300 hover:bg-gray-700 hover:text-white rounded-md px-3 py-2 text-sm font-medium">Dashboard</a>
                                <a href="#" id="nav-workouts" class="nav-link text-gray-300 hover:bg-gray-700 hover:text-white rounded-md px-3 py-2 text-sm font-medium">Workouts</a>
                                <a href="#" id="nav-progress" class="nav-link text-gray-300 hover:bg-gray-700 hover:text-white rounded-md px-3 py-2 text-sm font-medium">Progress</a>
                                <a href="#" id="nav-nutrition" class="nav-link text-gray-300 hover:bg-gray-700 hover:text-white rounded-md px-3 py-2 text-sm font-medium">Nutrition</a>
                            </div>
                        </div>
                    </div>
                    <div class="hidden md:block">
                        <div class="ml-4 flex items-center md:ml-6">
                            <button type="button" class="rounded-full bg-gray-800 p-1 text-gray-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800">
                                <span class="sr-only">View notifications</span>
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
                                </svg>
                            </button>
                            <!-- Profile dropdown -->
                            <div class="relative ml-3">
                                <div>
                                    <button type="button" class="flex max-w-xs items-center rounded-full bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800" id="user-menu-button" aria-expanded="false" aria-haspopup="true">
                                        <span class="sr-only">Open user menu</span>
                                        <img class="h-8 w-8 rounded-full" src="https://placehold.co/32x32/0f172a/FFF?text=U" alt="">
                                    </button>
                                </div>
                                <div id="profile-dropdown" class="absolute right-0 z-10 mt-2 w-48 origin-top-right rounded-md bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none hidden" role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button" tabindex="-1">
                                    <a href="#" class="block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="user-menu-item-0">Your Profile</a>
                                    <a href="#" class="block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="user-menu-item-1">Settings</a>
                                    <a href="#" id="sign-out-btn" class="block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1">Sign out</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="-mr-2 flex md:hidden">
                        <!-- Mobile menu button -->
                        <button type="button" id="mobile-menu-button" class="inline-flex items-center justify-center rounded-md bg-gray-800 p-2 text-gray-400 hover:bg-gray-700 hover:text-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800" aria-controls="mobile-menu" aria-expanded="false">
                            <span class="sr-only">Open main menu</span>
                            <svg id="mobile-menu-open-icon" class="block h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                            </svg>
                            <svg id="mobile-menu-close-icon" class="hidden h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Mobile menu, show/hide based on menu state. -->
            <div class="md:hidden hidden" id="mobile-menu">
                <div class="space-y-1 px-2 pt-2 pb-3 sm:px-3">
                    <a href="#" id="mobile-nav-dashboard" class="nav-link text-gray-300 hover:bg-gray-700 hover:text-white block rounded-md px-3 py-2 text-base font-medium">Dashboard</a>
                    <a href="#" id="mobile-nav-workouts" class="nav-link text-gray-300 hover:bg-gray-700 hover:text-white block rounded-md px-3 py-2 text-base font-medium">Workouts</a>
                    <a href="#" id="mobile-nav-progress" class="nav-link text-gray-300 hover:bg-gray-700 hover:text-white block rounded-md px-3 py-2 text-base font-medium">Progress</a>
                    <a href="#" id="mobile-nav-nutrition" class="nav-link text-gray-300 hover:bg-gray-700 hover:text-white block rounded-md px-3 py-2 text-base font-medium">Nutrition</a>
                </div>
                <div class="border-t border-gray-700 pt-4 pb-3">
                    <div class="flex items-center px-5">
                        <div class="flex-shrink-0">
                            <img class="h-10 w-10 rounded-full" src="https://placehold.co/40x40/0f172a/FFF?text=U" alt="">
                        </div>
                        <div class="ml-3">
                            <div id="user-email-display-mobile" class="text-base font-medium leading-none text-white"></div>
                        </div>
                        <button type="button" class="ml-auto flex-shrink-0 rounded-full bg-gray-800 p-1 text-gray-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800">
                            <span class="sr-only">View notifications</span>
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
                            </svg>
                        </button>
                    </div>
                    <div class="mt-3 space-y-1 px-2">
                        <a href="#" class="block rounded-md px-3 py-2 text-base font-medium text-gray-400 hover:bg-gray-700 hover:text-white">Your Profile</a>
                        <a href="#" class="block rounded-md px-3 py-2 text-base font-medium text-gray-400 hover:bg-gray-700 hover:text-white">Settings</a>
                        <a href="#" id="sign-out-btn-mobile" class="block rounded-md px-3 py-2 text-base font-medium text-gray-400 hover:bg-gray-700 hover:text-white">Sign out</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-grow p-8">
            <div id="dashboard-content" class="page-content">
                <h1 class="text-3xl font-bold">Dashboard</h1>
            </div>
            <div id="workouts-content" class="page-content">
                <h1 class="text-3xl font-bold">Workouts</h1>
            </div>
            <div id="progress-content" class="page-content">
                <h1 class="text-3xl font-bold">Progress</h1>
            </div>
            <div id="nutrition-content" class="page-content">
                <h1 class="text-3xl font-bold">Nutrition</h1>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
          apiKey: "AIzaSyDqQGsIz-mnJiMNZmkM0gL5eOhQV6jTAh0",
          authDomain: "fitnessapp-721d9.firebaseapp.com",
          projectId: "fitnessapp-721d9",
          storageBucket: "fitnessapp-721d9.appspot.com",
          messagingSenderId: "339656705043",
          appId: "1:339656705043:web:b5dbd141d09398014a2be6",
          measurementId: "G-XFQYPFN6GR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginContainer = document.getElementById('login-container');
        const appContainer = document.getElementById('app-container');
        const userEmailDisplay = document.getElementById('user-email-display');
        const userEmailDisplayMobile = document.getElementById('user-email-display-mobile');
        const profileDropdown = document.getElementById('profile-dropdown');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenuOpenIcon = document.getElementById('mobile-menu-open-icon');
        const mobileMenuCloseIcon = document.getElementById('mobile-menu-close-icon');

        const pages = ['dashboard', 'workouts', 'progress', 'nutrition'];

        function showPage(pageId) {
            pages.forEach(page => {
                document.getElementById(`${page}-content`).classList.remove('active');
                document.getElementById(`nav-${page}`).classList.remove('active');
                document.getElementById(`mobile-nav-${page}`)?.classList.remove('active');
            });
            document.getElementById(`${pageId}-content`).classList.add('active');
            document.getElementById(`nav-${pageId}`).classList.add('active');
            document.getElementById(`mobile-nav-${pageId}`)?.classList.add('active');
        }

        pages.forEach(pageId => {
            document.getElementById(`nav-${pageId}`).addEventListener('click', (e) => {
                e.preventDefault();
                showPage(pageId);
            });
            document.getElementById(`mobile-nav-${pageId}`)?.addEventListener('click', (e) => {
                e.preventDefault();
                showPage(pageId);
                mobileMenu.classList.add('hidden');
                mobileMenuOpenIcon.classList.remove('hidden');
                mobileMenuCloseIcon.classList.add('hidden');
            });
        });

        document.getElementById('nav-logo').addEventListener('click', (e) => {
            e.preventDefault();
            showPage('dashboard');
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userEmailDisplay.textContent = user.email;
                userEmailDisplayMobile.textContent = user.email;
                loginContainer.classList.remove('active');
                appContainer.classList.add('active');
                showPage('dashboard');
            } else {
                appContainer.classList.remove('active');
                loginContainer.classList.add('active');
            }
        });

        document.getElementById('user-menu-button').addEventListener('click', () => {
            profileDropdown.classList.toggle('hidden');
        });

        mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            mobileMenuOpenIcon.classList.toggle('hidden');
            mobileMenuCloseIcon.classList.toggle('hidden');
        });

        document.getElementById('show-signup').addEventListener('click', (e) => { e.preventDefault(); document.getElementById('login-form').style.display = 'none'; document.getElementById('signup-form').style.display = 'block'; });
        document.getElementById('show-login').addEventListener('click', (e) => { e.preventDefault(); document.getElementById('signup-form').style.display = 'none'; document.getElementById('login-form').style.display = 'block'; });

        const handleAuthAction = async (action, email, password, errorEl) => {
            const loadingOverlay = document.getElementById('loading-overlay');
            errorEl.textContent = '';
            loadingOverlay.classList.add('active');
            try {
                await action(auth, email, password);
            } catch (error) { 
                errorEl.textContent = error.message; 
            } finally {
                loadingOverlay.classList.remove('active');
            }
        };

        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            handleAuthAction(signInWithEmailAndPassword, email, password, errorEl);
        });

        document.getElementById('signup-btn').addEventListener('click', () => {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const errorEl = document.getElementById('signup-error');
            handleAuthAction(createUserWithEmailAndPassword, email, password, errorEl);
        });

        document.getElementById('sign-out-btn').addEventListener('click', () => signOut(auth));
        document.getElementById('sign-out-btn-mobile').addEventListener('click', () => signOut(auth));

    </script>
</body>
</html>
