<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness & Wellness Tracker</title>
  <!-- Use a modern, clean font and Tailwind CSS for styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load Lucide icons for a cleaner visual style -->
  <script src="https://unpkg.com/lucide@latest/dist/lucide.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Custom scrollbar for mood and workout lists */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 min-h-screen flex flex-col items-center">
  <!-- Main application container -->
  <div class="w-full max-w-4xl p-6 bg-white shadow-xl rounded-2xl flex flex-col gap-8">
    <header class="text-center mb-4">
      <h1 class="text-4xl font-bold text-emerald-600 mb-2">Fitness & Wellness Tracker</h1>
      <p class="text-slate-500 text-lg">Track your hydration, workouts, moods, and goals.</p>
    </header>

    <!-- Main content grid -->
    <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">

      <!-- Hydration Tracker -->
      <section id="hydration-section" class="bg-emerald-50 p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-semibold text-emerald-700 mb-4 flex items-center gap-2">
          <i data-lucide="droplet" class="text-emerald-500"></i>
          Hydration Tracker
        </h2>
        <div class="space-y-4">
          <div>
            <label for="water-input" class="block text-sm font-medium text-slate-700 mb-1">Enter water intake (ml):</label>
            <input type="number" id="water-input" min="0" step="50" placeholder="e.g. 250"
              class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all" />
          </div>
          <div class="flex gap-2">
            <button id="add-water-btn"
              class="flex-1 bg-emerald-600 text-white font-semibold py-2 rounded-md shadow-sm hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition-colors">
              Add Water
            </button>
            <button id="reset-water-btn"
              class="bg-slate-300 text-slate-800 font-semibold py-2 px-4 rounded-md shadow-sm hover:bg-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 transition-colors">
              Reset
            </button>
          </div>
        </div>
        <div class="mt-4">
          <div class="w-full bg-emerald-200 rounded-full h-4">
            <div id="water-progress"
              class="bg-emerald-600 h-full rounded-full transition-all duration-500 ease-in-out"
              style="width: 0%;"></div>
          </div>
          <p class="text-sm text-slate-500 mt-2">Daily goal: 2000 ml</p>
          <p class="text-base font-medium mt-1">Total today: <span id="water-total" class="font-bold text-emerald-700">0</span> ml</p>
        </div>
      </section>

      <!-- Workout Log -->
      <section id="workout-section" class="bg-violet-50 p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-semibold text-violet-700 mb-4 flex items-center gap-2">
          <i data-lucide="dumbbell" class="text-violet-500"></i>
          Workout Log
        </h2>
        <div class="space-y-4">
          <div>
            <label for="workout-type" class="block text-sm font-medium text-slate-700 mb-1">Workout type:</label>
            <input type="text" id="workout-type" placeholder="e.g. Running, Yoga"
              class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-all" />
          </div>
          <div>
            <label for="workout-duration" class="block text-sm font-medium text-slate-700 mb-1">Duration (minutes):</label>
            <input type="number" id="workout-duration" min="1" max="600" placeholder="e.g. 30"
              class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-all" />
          </div>
          <div class="flex gap-2">
            <button id="add-workout-btn"
              class="flex-1 bg-violet-600 text-white font-semibold py-2 rounded-md shadow-sm hover:bg-violet-700 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:ring-offset-2 transition-colors">
              Add Workout
            </button>
            <button id="reset-workout-btn"
              class="bg-slate-300 text-slate-800 font-semibold py-2 px-4 rounded-md shadow-sm hover:bg-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 transition-colors">
              Reset
            </button>
          </div>
        </div>
        <ul id="workout-list" class="mt-4 h-32 overflow-y-auto bg-white border border-slate-200 rounded-md divide-y divide-slate-100"></ul>
      </section>

      <!-- Mood Journal -->
      <section id="mood-section" class="bg-yellow-50 p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-semibold text-yellow-700 mb-4 flex items-center gap-2">
          <i data-lucide="smile" class="text-yellow-500"></i>
          Mood Journal
        </h2>
        <p class="text-sm font-medium text-slate-700 mb-2">Select your current mood:</p>
        <div class="flex flex-wrap gap-2 mb-4" role="radiogroup" aria-label="Mood selection">
          <button type="button" data-mood="Happy"
            class="mood-btn bg-white border border-slate-300 rounded-full w-10 h-10 flex items-center justify-center text-xl hover:bg-yellow-100 transition-colors"
            title="Happy">
            😊
          </button>
          <button type="button" data-mood="Neutral"
            class="mood-btn bg-white border border-slate-300 rounded-full w-10 h-10 flex items-center justify-center text-xl hover:bg-yellow-100 transition-colors"
            title="Neutral">
            😐
          </button>
          <button type="button" data-mood="Sad"
            class="mood-btn bg-white border border-slate-300 rounded-full w-10 h-10 flex items-center justify-center text-xl hover:bg-yellow-100 transition-colors"
            title="Sad">
            😔
          </button>
          <button type="button" data-mood="Angry"
            class="mood-btn bg-white border border-slate-300 rounded-full w-10 h-10 flex items-center justify-center text-xl hover:bg-yellow-100 transition-colors"
            title="Angry">
            😡
          </button>
          <button type="button" data-mood="Tired"
            class="mood-btn bg-white border border-slate-300 rounded-full w-10 h-10 flex items-center justify-center text-xl hover:bg-yellow-100 transition-colors"
            title="Tired">
            😴
          </button>
        </div>
        <div class="flex gap-2">
          <button id="add-mood-btn" disabled
            class="flex-1 bg-yellow-600 text-white font-semibold py-2 rounded-md shadow-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-yellow-700 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:ring-offset-2 transition-colors">
            Add Mood
          </button>
          <button id="reset-mood-btn"
            class="bg-slate-300 text-slate-800 font-semibold py-2 px-4 rounded-md shadow-sm hover:bg-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 transition-colors">
            Reset
          </button>
        </div>
        <ul id="mood-list" class="mt-4 h-32 overflow-y-auto bg-white border border-slate-200 rounded-md divide-y divide-slate-100"></ul>
      </section>

      <!-- Goals & Quotes -->
      <section id="goals-section" class="bg-sky-50 p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-semibold text-sky-700 mb-4 flex items-center gap-2">
          <i data-lucide="target" class="text-sky-500"></i>
          Goals & Quotes
        </h2>
        <div class="space-y-4">
          <div>
            <label for="goal-input" class="block text-sm font-medium text-slate-700 mb-1">Set a fitness goal:</label>
            <input type="text" id="goal-input" placeholder="e.g. Run 5km, Drink 2L water daily"
              class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-all" />
          </div>
          <div class="flex gap-2">
            <button id="set-goal-btn"
              class="flex-1 bg-sky-600 text-white font-semibold py-2 rounded-md shadow-sm hover:bg-sky-700 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2 transition-colors">
              Set Goal
            </button>
            <button id="reset-goal-btn"
              class="bg-slate-300 text-slate-800 font-semibold py-2 px-4 rounded-md shadow-sm hover:bg-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 transition-colors">
              Reset
            </button>
          </div>
          <p class="text-sm font-medium text-slate-700">Current Goal:</p>
          <p id="current-goal" class="text-base font-bold text-sky-700 p-3 bg-white rounded-md border border-sky-200">
            No goal set
          </p>
        </div>
        <div id="motivational-quote" class="mt-6 p-4 bg-sky-100 rounded-md text-sky-800 italic text-center"></div>
      </section>
    </main>

    <!-- Custom Modal for Alerts and Confirmations -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
      <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm">
        <p id="modal-message" class="text-lg font-medium text-slate-800 mb-4"></p>
        <div class="flex justify-end gap-2">
          <button id="modal-cancel-btn" class="hidden bg-slate-300 text-slate-800 font-semibold py-2 px-4 rounded-md hover:bg-slate-400">
            Cancel
          </button>
          <button id="modal-ok-btn" class="bg-emerald-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-emerald-700">
            OK
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Custom Modal implementation to replace alert() and confirm()
    const customModal = document.getElementById('custom-modal');
    const modalMessage = document.getElementById('modal-message');
    const modalOkBtn = document.getElementById('modal-ok-btn');
    const modalCancelBtn = document.getElementById('modal-cancel-btn');

    /**
     * Shows a custom alert modal.
     * @param {string} message The message to display.
     */
    function showAlert(message) {
      modalMessage.textContent = message;
      modalCancelBtn.classList.add('hidden');
      customModal.classList.remove('hidden');
      modalOkBtn.onclick = () => {
        customModal.classList.add('hidden');
      };
    }

    /**
     * Shows a custom confirmation modal.
     * @param {string} message The message to display.
     * @returns {Promise<boolean>} A promise that resolves to true if 'OK' is clicked, false otherwise.
     */
    function showConfirm(message) {
      return new Promise(resolve => {
        modalMessage.textContent = message;
        modalCancelBtn.classList.remove('hidden');
        customModal.classList.remove('hidden');

        modalOkBtn.onclick = () => {
          customModal.classList.add('hidden');
          resolve(true);
        };
        modalCancelBtn.onclick = () => {
          customModal.classList.add('hidden');
          resolve(false);
        };
      });
    }

    // Helper to check if it's a new day since last stored date
    function isNewDay(lastDateStr) {
      if (!lastDateStr) return true;
      const lastDate = new Date(lastDateStr);
      const today = new Date();
      return lastDate.toDateString() !== today.toDateString();
    }

    // --- Hydration Tracker ---
    const waterInput = document.getElementById('water-input');
    const addWaterBtn = document.getElementById('add-water-btn');
    const resetWaterBtn = document.getElementById('reset-water-btn');
    const waterTotalEl = document.getElementById('water-total');
    const waterProgress = document.getElementById('water-progress');
    const DAILY_WATER_GOAL = 2000; // 2000 ml daily goal

    // Load hydration from localStorage or reset if new day
    const lastWaterDate = localStorage.getItem('waterDate');
    let waterTotal = 0;
    if (isNewDay(lastWaterDate)) {
      waterTotal = 0;
      localStorage.setItem('waterTotal', waterTotal);
      localStorage.setItem('waterDate', new Date().toISOString());
    } else {
      waterTotal = parseInt(localStorage.getItem('waterTotal')) || 0;
    }

    function updateWaterUI() {
      waterTotalEl.textContent = waterTotal;
      let progressPercent = Math.min((waterTotal / DAILY_WATER_GOAL) * 100, 100);
      waterProgress.style.width = progressPercent + '%';
    }

    addWaterBtn.addEventListener('click', () => {
      let intake = parseInt(waterInput.value);
      if (!intake || intake <= 0) {
        showAlert('Please enter a positive number for water intake.');
        return;
      }
      waterTotal += intake;
      localStorage.setItem('waterTotal', waterTotal);
      localStorage.setItem('waterDate', new Date().toISOString());
      updateWaterUI();
      waterInput.value = '';
    });

    resetWaterBtn.addEventListener('click', async () => {
      const confirmed = await showConfirm('Are you sure you want to reset your hydration data?');
      if (confirmed) {
        waterTotal = 0;
        localStorage.removeItem('waterTotal');
        localStorage.removeItem('waterDate');
        updateWaterUI();
      }
    });

    updateWaterUI();

    // --- Workout Log ---
    const workoutTypeInput = document.getElementById('workout-type');
    const workoutDurationInput = document.getElementById('workout-duration');
    const addWorkoutBtn = document.getElementById('add-workout-btn');
    const resetWorkoutBtn = document.getElementById('reset-workout-btn');
    const workoutList = document.getElementById('workout-list');

    let workouts = JSON.parse(localStorage.getItem('workouts')) || [];

    function renderWorkouts() {
      workoutList.innerHTML = '';
      if (workouts.length === 0) {
        workoutList.innerHTML = '<li class="p-3 text-sm text-slate-500">No workouts logged yet.</li>';
        return;
      }
      workouts.forEach((w, i) => {
        const li = document.createElement('li');
        li.className = 'p-3 text-sm flex items-center justify-between group';
        li.innerHTML = `
          <span>${w.type} &mdash; ${w.duration} min</span>
          <button class="text-slate-400 hover:text-red-500 transition-colors hidden group-hover:block" title="Delete workout">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        `;

        li.querySelector('button').addEventListener('click', async () => {
          const confirmed = await showConfirm('Are you sure you want to delete this workout entry?');
          if (confirmed) {
            workouts.splice(i, 1);
            localStorage.setItem('workouts', JSON.stringify(workouts));
            renderWorkouts();
          }
        });

        workoutList.appendChild(li);
        lucide.createIcons(); // Re-render icons for new elements
      });
    }

    addWorkoutBtn.addEventListener('click', () => {
      const type = workoutTypeInput.value.trim();
      const duration = parseInt(workoutDurationInput.value);
      if (!type) {
        showAlert('Please enter a workout type.');
        return;
      }
      if (!duration || duration <= 0) {
        showAlert('Please enter a positive workout duration.');
        return;
      }
      workouts.push({
        type,
        duration,
        date: new Date().toLocaleString()
      });
      localStorage.setItem('workouts', JSON.stringify(workouts));
      renderWorkouts();
      workoutTypeInput.value = '';
      workoutDurationInput.value = '';
    });

    resetWorkoutBtn.addEventListener('click', async () => {
      const confirmed = await showConfirm('Are you sure you want to reset all workout logs?');
      if (confirmed) {
        workouts = [];
        localStorage.removeItem('workouts');
        renderWorkouts();
      }
    });

    renderWorkouts();

    // --- Mood Journal ---
    const moodButtons = document.querySelectorAll('.mood-btn');
    const addMoodBtn = document.getElementById('add-mood-btn');
    const resetMoodBtn = document.getElementById('reset-mood-btn');
    const moodList = document.getElementById('mood-list');

    let selectedMood = null;
    // Load moods from localStorage or reset if new day
    const lastMoodDate = localStorage.getItem('moodDate');
    let moods = [];
    if (isNewDay(lastMoodDate)) {
      moods = [];
      localStorage.setItem('moods', JSON.stringify(moods));
      localStorage.setItem('moodDate', new Date().toISOString());
    } else {
      moods = JSON.parse(localStorage.getItem('moods')) || [];
    }

    moodButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        moodButtons.forEach(b => {
          b.classList.remove('bg-yellow-500', 'text-white');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('bg-yellow-500', 'text-white');
        btn.setAttribute('aria-pressed', 'true');
        selectedMood = btn.dataset.mood;
        addMoodBtn.disabled = false;
      });
    });

    addMoodBtn.addEventListener('click', () => {
      if (!selectedMood) return;
      const now = new Date().toLocaleString();
      moods.push({ mood: selectedMood, date: now });
      localStorage.setItem('moods', JSON.stringify(moods));
      localStorage.setItem('moodDate', new Date().toISOString());
      renderMoods();
      selectedMood = null;
      addMoodBtn.disabled = true;
      moodButtons.forEach(b => {
        b.classList.remove('bg-yellow-500', 'text-white');
        b.setAttribute('aria-pressed', 'false');
      });
    });

    resetMoodBtn.addEventListener('click', async () => {
      const confirmed = await showConfirm('Are you sure you want to reset your mood journal?');
      if (confirmed) {
        moods = [];
        localStorage.removeItem('moods');
        localStorage.removeItem('moodDate');
        renderMoods();
      }
    });

    function renderMoods() {
      moodList.innerHTML = '';
      if (moods.length === 0) {
        moodList.innerHTML = '<li class="p-3 text-sm text-slate-500">No moods logged yet.</li>';
        return;
      }
      moods.forEach((entry, i) => {
        const li = document.createElement('li');
        li.className = 'p-3 text-sm flex items-center justify-between group';
        li.innerHTML = `
          <span>${entry.date} &mdash; ${getMoodEmoji(entry.mood)}</span>
          <button class="text-slate-400 hover:text-red-500 transition-colors hidden group-hover:block" title="Delete mood entry">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        `;

        li.querySelector('button').addEventListener('click', async () => {
          const confirmed = await showConfirm('Are you sure you want to delete this mood entry?');
          if (confirmed) {
            moods.splice(i, 1);
            localStorage.setItem('moods', JSON.stringify(moods));
            renderMoods();
          }
        });

        moodList.appendChild(li);
        lucide.createIcons();
      });
    }

    function getMoodEmoji(mood) {
      switch (mood) {
        case 'Happy': return '😊';
        case 'Neutral': return '😐';
        case 'Sad': return '😔';
        case 'Angry': return '�';
        case 'Tired': return '😴';
        default: return '';
      }
    }

    renderMoods();

    // --- Goals & Motivational Quotes ---
    const goalInput = document.getElementById('goal-input');
    const setGoalBtn = document.getElementById('set-goal-btn');
    const resetGoalBtn = document.getElementById('reset-goal-btn');
    const currentGoalEl = document.getElementById('current-goal');
    const quoteEl = document.getElementById('motivational-quote');

    let currentGoal = localStorage.getItem('fitnessGoal') || null;

    const quotes = [
      "The only bad workout is the one that didn't happen.",
      "Push yourself because no one else is going to do it for you.",
      "Don’t limit your challenges. Challenge your limits.",
      "Sweat is fat crying.",
      "Strive for progress, not perfection.",
      "You don’t have to be great to start, but you have to start to be great.",
      "Your body can stand almost anything. It’s your mind that you have to convince.",
      "Fitness is not about being better than someone else. It’s about being better than you used to be."
    ];

    function updateGoalUI() {
      currentGoalEl.textContent = currentGoal || 'No goal set';
    }

    function showRandomQuote() {
      const idx = Math.floor(Math.random() * quotes.length);
      quoteEl.textContent = `"${quotes[idx]}"`;
    }

    setGoalBtn.addEventListener('click', () => {
      const goalText = goalInput.value.trim();
      if (!goalText) {
        showAlert('Please enter a goal.');
        return;
      }
      currentGoal = goalText;
      localStorage.setItem('fitnessGoal', currentGoal);
      updateGoalUI();
      goalInput.value = '';
    });

    resetGoalBtn.addEventListener('click', async () => {
      const confirmed = await showConfirm('Are you sure you want to clear your current goal?');
      if (confirmed) {
        currentGoal = null;
        localStorage.removeItem('fitnessGoal');
        updateGoalUI();
      }
    });

    updateGoalUI();
    showRandomQuote();
  </script>
</body>
</html>
